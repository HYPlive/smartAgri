spring:
#  jpa:
#    database-platform: org.hibernate.dialect.MySQL8Dialect
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    url: jdbc:mysql://localhost:3306/mydb?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&serverTimezone=GMT
    driver-class-name: com.mysql.cj.jdbc.Driver

  devtools:
    restart:
      # 设置不参与热部署的文件或文件夹
      exclude: public/**,config/application.yml
server:
  port: 8080
amap:
  key: ${AMAP_KEY:your_amap_key_here}


jwt:
  # 设置jwt签名加密时使用的秘钥
  admin-secret-key: ${JWT_ADMIN_SECRET:your_admin_secret_here}
  # 设置jwt过期时间 2小时
  admin-ttl: 7200000
  # 设置前端传递过来的令牌名称
  admin-token-name: token
  # 设置jwt签名加密时使用的秘钥
  user-secret-key: ${JWT_USER_SECRET:your_user_secret_here}
  # 设置jwt过期时间 2小时
  user-ttl: 7200000
  # 设置前端传递过来的令牌名称
  user-token-name: authentication

llm:
  api-key: ${LLM_API_KEY:your_llm_api_key_here}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com}
  model: ${LLM_MODEL:deepseek-chat}
  chat-endpoint: /v1/chat/completions
  system-prompt: |
    你是智慧农业管理系统的 AI 助手，擅长农业遥感分析、地块管理和农情诊断。
    你可以帮助用户：查询地块信息、分析异常数据、解释遥感指标（NDVI/EVI/SAVI/NDWI）、
    规划巡田路径、生成农情报告。请用专业但易懂的语言回答，必要时调用工具获取实时数据。