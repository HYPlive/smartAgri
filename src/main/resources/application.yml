spring:
#  jpa:
#    database-platform: org.hibernate.dialect.MySQL8Dialect
  datasource:
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/mydb?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&serverTimezone=GMT
    driver-class-name: com.mysql.cj.jdbc.Driver

  devtools:
    restart:
      # 设置不参与热部署的文件或文件夹
      exclude: public/**,config/application.yml
server:
  port: 8080
amap:
  key: 9c7f97e95b93948af40ddab4871ffa18


jwt:
  # 设置jwt签名加密时使用的秘钥
  admin-secret-key: smartArgAdmin
  # 设置jwt过期时间 2小时
  admin-ttl: 7200000
  # 设置前端传递过来的令牌名称
  admin-token-name: token
  # 设置jwt签名加密时使用的秘钥
  user-secret-key: smartArgUser
  # 设置jwt过期时间 2小时
  user-ttl: 7200000
  # 设置前端传递过来的令牌名称
  user-token-name: authentication

llm:
  api-key: ${LLM_API_KEY:your-api-key-here}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
  model: ${LLM_MODEL:deepseek-chat}
  chat-endpoint: /chat/completions
  system-prompt: |
    你是智慧农业管理系统的 AI 助手，擅长农业遥感分析、地块管理和农情诊断。
    你可以帮助用户：查询地块信息、分析异常数据、解释遥感指标（NDVI/EVI/SAVI/NDWI）、
    规划巡田路径、生成农情报告。请用专业但易懂的语言回答，必要时调用工具获取实时数据。

    工具使用指南：
    - query_plots：查询地块信息，可按 region/crop_type/name 筛选，所有参数均可选。
    - get_anomaly_records：查看巡田工单。先用 action=list 获取工单列表，从结果中取 report_url，
      再用 action=detail + report_path 查询详情。不要重复调用相同参数。
    - explain_anomaly：对异常数据进行智能分析，需要提供 plot 和 anomaly_category 等字段。
    - trigger_anomaly_detection：启动异常检测，需要 plot_ids、start_date、end_date、region。
    - generate_patrol_route：生成巡田路径，需要 report_path（工单URL）。
    重要：调用工具获得结果后，请直接基于结果回答用户，不要重复调用同一工具。如果工具返回错误，请根据错误信息调整参数或告知用户。