<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cesium 农田管理系统</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }


    </style>
    <style>
        /* 顶部容器（关键） */
        #topPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 12px; /* 两个面板之间间距 */
            z-index: 999;
        }

        /* 查询区域包一层 */
        #queryWrapper {
            position: relative;
        }

        /* 查询按钮 */
        #queryBtn {
            background: rgba(30,30,30,0.85);
            color: #fff;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* 查询面板（相对按钮展开） */
        #queryPanel {
            position: absolute;
            top: 40px;
            left: 0;
            width: 260px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(20,20,20,0.9);
            color: #fff;
            border-radius: 6px;
        }

        /* NDVI 面板 */
        /* NDVI 区域包一层 */
        #ndviWrapper {
            position: relative;
        }

        /* NDVI 按钮 */
        #ndviBtn {
            background: rgba(30,30,30,0.85);
            color: #fff;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* NDVI 折叠面板 */
        #ndviPanel {
            position: absolute;
            top: 40px;
            left: 0;
            width: 240px;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(6px);
            color: #fff;
            border-radius: 6px;
            overflow: hidden;
        }

        .ndvi-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #ndviPanel select,
        #ndviPanel button {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border-radius: 4px;
            border: none;
        }

        /* 通用 */
        .panel-header {
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #444;
        }

        .plot-item {
            padding: 8px 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .plot-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div id="cesiumContainer"></div>
<!-- 查询UI -->
<div id="topPanel">
    <div id="queryWrapper">
        <div id="queryBtn">查询地块</div>
        <div id="queryPanel" class="hidden">
            <div class="panel-header">地块列表</div>
            <div id="plotList"></div>
        </div>
    </div>
    <div id="ndviWrapper">
        <div id="ndviBtn">NDVI控制</div>
        <div id="ndviPanel" class="hidden">
            <div class="panel-header">NDVI控制</div>
            <div class="ndvi-body">
                <select id="regionSelect">
                    <option value="" selected disabled>选择地区</option>
                    <option value="zhangbei">张北</option>
                    <option value="guyuan">沽源</option>
                </select>
                <select id="timeSelect">
                    <option value="" selected disabled>请选择日期</option>
                </select>
                <button id="removeNdviBtn">移除NDVI</button>
            </div>
        </div>
    </div>
</div>


<script>
    /* ========================
       1. 配置
    ======================== */
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4Mjk2MjRhNy00YWIyLTQxZWQtOGZmYi02ZWIyNDc5OTgyY2QiLCJpZCI6NDE4NDc4LCJpYXQiOjE3NzYyNDE4MTJ9.jDM1zCdKiaw4UgeFbNp7Akr1TS-v2rSOwsXjvsaU6CQ";

    const API_URL = "http://localhost:8080/admin/plots";
    const token = localStorage.getItem("token_admin");


    const STYLE = {
        lineWidth: 4,
        defaultLine: Cesium.Color.BLUE,
        highlightLine: Cesium.Color.YELLOW
    };

    /* ========================
       2. Viewer
    ======================== */
    const viewer = new Cesium.Viewer("cesiumContainer", {
        terrain: Cesium.Terrain.fromWorldTerrain(),
        animation: false,
        timeline: false
    });
    //开启地形深度检测  作用:如果一个像素点位于地形表面之下，则不进行绘制。
    //这确保了我们向下延伸的wal1只有露出地表的部分可见，内部复杂的网格被完美遮挡。
    viewer.scene.globe.depthTestAgainstTerrain = true;

    /* ========================
       3. 状态
    ======================== */
    let selectedEntity = null;
    let hasFlown = false;
    const plotMap = new Map(); // id -> entity

    /* ========================
       4. 初始化
    ======================== */
    init();

    function init() {
        loadPlots();
        initClickHandler();
        initPanel();
    }

    /* ========================
       5. 加载数据
    ======================== */
    async function loadPlots() {
        try {
            const res = await fetch(API_URL, {
                headers: { token }
            });

            if (!res.ok) throw new Error("请求失败");

            const plots = await res.json();

            plots.forEach(renderPlot);

            buildPlotList(plots);

            console.log("地块加载完成，共", plots.length);
        } catch (err) {
            console.error("加载失败：", err);
            alert("后端服务异常");
        }
    }

    /* ========================
       6. 渲染地块
    ======================== */
    function renderPlot(plot) {
        if (!plot.coordinates) return;

        let geo;
        try {
            geo = JSON.parse(plot.coordinates);
        } catch (e) {
            console.error("解析失败", plot);
            return;
        }

        if (geo.shapeType !== "polygon") return;

        const positions = geo.latlngs.map(p => [p.lng, p.lat]).flat();

        // polygon（只做点击）
        const entity = viewer.entities.add({
            name: plot.plotName,
            polygon: {
                hierarchy: Cesium.Cartesian3.fromDegreesArray(positions),
                material: Cesium.Color.TRANSPARENT,
                outline: false
            },
            description: `
            <div style="padding:10px;">
                <h3>${plot.plotName}</h3>
                <p><b>作物：</b>${plot.currentCrop}</p>
                <p><b>面积：</b>${plot.area} 亩</p>
                <p><b>联系人：</b>${plot.contactPerson}</p>
                <p><b>电话：</b>${plot.phone}</p>
            </div>
        `
        });

        // 边框线
        const linePositions = [...positions, positions[0], positions[1]];

        const lineEntity = viewer.entities.add({
            polyline: {
                positions: Cesium.Cartesian3.fromDegreesArray(linePositions),
                width: STYLE.lineWidth,
                material: STYLE.defaultLine,
                clampToGround: true
            }
        });

        // 绑定
        entity.border = lineEntity;
        entity.plotData = plot;
        plotMap.set(plot.id, entity);

        // 首次定位
        if (!hasFlown) {
            viewer.flyTo(entity);
            hasFlown = true;
        }
    }

    /* ========================
       7. 点击高亮
    ======================== */
    function initClickHandler() {
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

        handler.setInputAction((click) => {
            const picked = viewer.scene.pick(click.position);
            if (!Cesium.defined(picked) || !picked.id) return;

            const entity = picked.id;
            if (!entity.polygon) return;

            selectEntity(entity);

        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    }

    function selectEntity(entity) {
        if (selectedEntity && selectedEntity !== entity) {
            resetEntityStyle(selectedEntity);
        }

        highlightEntity(entity);
        selectedEntity = entity;

        viewer.flyTo(entity, { duration: 1 });
    }

    function highlightEntity(entity) {
        entity.border.polyline.material = STYLE.highlightLine;
    }

    function resetEntityStyle(entity) {
        entity.border.polyline.material = STYLE.defaultLine;
    }

    /* ========================
       8. 查询面板
    ======================== */
    function initPanel() {
        const queryBtn = document.getElementById("queryBtn");
        const queryPanel = document.getElementById("queryPanel");

        const ndviBtn = document.getElementById("ndviBtn");
        const ndviPanel = document.getElementById("ndviPanel");

        const queryWrapper = document.getElementById("queryWrapper");
        const ndviWrapper = document.getElementById("ndviWrapper");

        // 查询地块：点击按钮展开/收起
        queryBtn.onclick = (e) => {
            e.stopPropagation();
            queryPanel.classList.toggle("hidden");
            ndviPanel.classList.add("hidden");
        };

        // NDVI：点击按钮展开/收起
        ndviBtn.onclick = (e) => {
            e.stopPropagation();
            ndviPanel.classList.toggle("hidden");
            queryPanel.classList.add("hidden");
        };

        // 点击面板内部时，不触发关闭
        queryWrapper.onclick = (e) => {
            e.stopPropagation();
        };

        ndviWrapper.onclick = (e) => {
            e.stopPropagation();
        };

        // 点击空白处自动关闭
        document.addEventListener("click", () => {
            queryPanel.classList.add("hidden");
            ndviPanel.classList.add("hidden");
        });
    }

    function buildPlotList(plots) {
        const container = document.getElementById("plotList");
        container.innerHTML = "";

        plots.forEach(plot => {
            const div = document.createElement("div");
            div.className = "plot-item";
            div.innerText = plot.plotName;

            div.onclick = () => {
                flyToPlot(plot.id);
            };

            container.appendChild(div);
        });
    }

    function flyToPlot(plotId) {
        const entity = plotMap.get(plotId);
        if (!entity) return;

        selectEntity(entity);
    }
</script>

<script>
    /* ========================
       NDVI 状态
    ======================== */
    const regionSelect = document.getElementById("regionSelect");
    const timeSelect = document.getElementById("timeSelect");
    const removeNdviBtn = document.getElementById("removeNdviBtn");

    let currentNdviTime = null;
    let ndviLayers = [];
    const regionNdviTimeCache = {};

    /* ========================
       NDVI：地区选择
    ======================== */
    regionSelect.addEventListener("change", async () => {
        const region = regionSelect.value;

        timeSelect.innerHTML = `<option value="" selected disabled>请选择日期</option>`;
        currentNdviTime = null;

        try {
            const res = await fetch(`http://123.56.228.32:8000/admin/ndvilist?region=${region}`, {
                headers: {"token": token}
            });

            const ndviList = await res.json();
            regionNdviTimeCache[region] = ndviList;

            if (!Array.isArray(ndviList) || ndviList.length === 0) {
                alert(`⚠️ ${region} 暂无 NDVI 数据`);
                return;
            }

            const grouped = {};

            ndviList.forEach(item => {
                if (!grouped[item.year]) grouped[item.year] = [];
                grouped[item.year].push(item);
            });

            Object.keys(grouped).sort().forEach(year => {
                const optgroup = document.createElement("optgroup");
                optgroup.label = year;

                grouped[year].forEach(item => {
                    const key = `${item.year}-${item.date.slice(0,2)}-${item.date.slice(2,4)}`;
                    const option = document.createElement("option");
                    option.value = key;
                    option.textContent = key;
                    optgroup.appendChild(option);
                });

                timeSelect.appendChild(optgroup);
            });

        } catch (err) {
            console.error("NDVI列表失败", err);
            alert("获取NDVI日期失败");
        }
    });

    /* ========================
       NDVI：时间选择
    ======================== */
    timeSelect.addEventListener("change", async () => {
        const region = regionSelect.value;
        const selectedTime = timeSelect.value;

        if (!region || !selectedTime) return;
        if (selectedTime === currentNdviTime) return;

        currentNdviTime = selectedTime;

        const dateForApi = selectedTime.replace(/-(\d{2})-(\d{2})/, "_$1$2");

        removeAllNdviLayers();

        try {
            // 获取地块
            const resPlots = await fetch("http://localhost:8080/admin/plots", {
                headers: {"token": token}
            });

            const rawPlots = await resPlots.json();

            const requestData = transformPlotsForNdviCut(rawPlots, dateForApi);
            requestData.region = region;

            // 裁剪接口
            const resCut = await fetch("http://123.56.228.32:8000/admin/ndvicut", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "token": token
                },
                body: JSON.stringify(requestData)
            });

            const results = await resCut.json();

            if (!results.success || results.success.length === 0) {
                alert("⚠️ 无NDVI结果");
                return;
            }

            // 👉 Cesium加载
            results.success.forEach(item => {
                const bounds = item.bounds;

                const rectangle = Cesium.Rectangle.fromDegrees(
                    bounds[0][1], // west
                    bounds[0][0], // south
                    bounds[1][1], // east
                    bounds[1][0]  // north
                );

                const layer = viewer.imageryLayers.addImageryProvider(
                    new Cesium.SingleTileImageryProvider({
                        url: item.png_url,
                        rectangle: rectangle
                    })
                );

                ndviLayers.push(layer);
            });

            console.log("NDVI加载完成");

        } catch (err) {
            console.error("NDVI加载失败", err);
            alert("NDVI加载失败");
        }
    });

    /* ========================
       NDVI：移除
    ======================== */
    removeNdviBtn.addEventListener("click", () => {
        removeAllNdviLayers();
        currentNdviTime = null;
        timeSelect.value = "";
    });

    /* ========================
       NDVI：工具函数
    ======================== */
    function removeAllNdviLayers() {
        ndviLayers.forEach(layer => {
            viewer.imageryLayers.remove(layer);
        });
        ndviLayers = [];
    }

    /* ========================
       ⚠️ 必须补一个函数（你后端用的）
    ======================== */
    // 转换地块数据格式
    function transformPlotsForNdviCut(rawPlots, dateStr) {
        const plots = rawPlots.map(item => {
            let polygonObj;
            try {
                polygonObj = typeof item.coordinates === 'string' ? JSON.parse(item.coordinates) : item.coordinates;
            } catch (e) {
                console.warn(`地块 ${item.plotName} 坐标解析失败`, e);
                polygonObj = null;
            }
            return {
                plotId: item.id,
                plotname: item.plotName,
                polygon: polygonObj
            };
        }).filter(p => p.polygon);

        return {date: dateStr, plots};
    }

</script>
</body>
</html>
