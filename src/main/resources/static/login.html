<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 — 农田智能监测与巡田决策平台</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./lib/layui/css/layui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/jquery.min.js"></script>
    <script src="./lib/layui/layui.js" charset="utf-8"></script>
</head>
<body class="login-bg">

<div class="login">
    <!-- 顶部标题区 -->
    <div class="login-header">
        <div class="logo-icon">
            <i class="fa fa-leaf"></i>
        </div>
        <h1 class="title">农田智能监测平台</h1>
        <p class="subtitle">Smart Agriculture Monitoring & Patrol Decision System</p>
    </div>

    <!-- 表单区 -->
    <div class="login-body">
        <form class="layui-form" id="Form">
            <div class="input-group">
                <label>用户名</label>
                <div class="input-wrapper">
                    <input name="username" placeholder="请输入用户名" type="text" lay-verify="required" autocomplete="username">
                    <i class="fa fa-user input-icon"></i>
                </div>
            </div>

            <div class="input-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <input name="password" placeholder="请输入密码" type="password" lay-verify="required" autocomplete="current-password">
                    <i class="fa fa-lock input-icon"></i>
                </div>
            </div>

            <div class="input-group">
                <label>登录身份</label>
                <div class="input-wrapper">
                    <select name="role" lay-verify="required">
                        <option value="">请选择身份</option>
                        <option value="admin">管理员</option>
                        <option value="user">普通用户</option>
                    </select>
                    <i class="fa fa-id-badge input-icon"></i>
                </div>
            </div>

            <button lay-submit lay-filter="login" class="login-btn">
                <i class="fa fa-sign-in"></i>&nbsp; 登 录
            </button>
        </form>
    </div>

    <div class="login-footer">
        农田智能监测与巡田决策平台 &copy; 2026
    </div>
</div>

<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;

        form.on('submit(login)', function(data){
            var formData = $("#Form").serializeArray();
            var formObj = {};
            formData.forEach(function(item){
                formObj[item.name] = item.value;
            });

            var role = formObj.role;
            if (!role) {
                layer.msg("请选择登录身份", {icon: 2});
                return false;
            }

            var loginUrl = role === 'admin' ? '/admin/login' : '/user/login';

            // 按钮加载状态
            var $btn = $(data.elem);
            var originalText = $btn.html();
            $btn.html('<i class="fa fa-spinner fa-spin"></i>&nbsp; 登录中...');
            $btn.prop('disabled', true);

            $.ajax({
                url: loginUrl,
                type: "post",
                data: {
                    username: formObj.username,
                    password: formObj.password
                },
                success: function(res){
                    if (res.code === 1 && res.data) {
                        layer.msg(res.message || "登录成功", {icon: 1});

                        if (role === 'admin') {
                            localStorage.setItem("token_admin", res.data);
                        } else {
                            localStorage.setItem("token_user", res.data);
                        }
                        localStorage.setItem("role", role);
                        localStorage.setItem("username", formObj.username);

                        setTimeout(function(){
                            if (role === 'admin') {
                                window.location.href = "admin-index.html";
                            } else {
                                window.location.href = "user-index.html";
                            }
                        }, 800);
                    } else {
                        layer.msg(res.message || "账号或密码错误", {icon: 2});
                        $btn.html(originalText);
                        $btn.prop('disabled', false);
                    }
                },
                error: function(err){
                    console.error("请求异常", err);
                    layer.msg("请求失败，请检查服务器连接", {icon: 2});
                    $btn.html(originalText);
                    $btn.prop('disabled', false);
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
