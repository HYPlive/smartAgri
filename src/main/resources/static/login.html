<!doctype html>
<html class="x-admin-sm">
<head>
    <meta charset="UTF-8">
    <title>后台登录 - 智慧农业系统</title>
    <meta name="renderer" content="webkit|ie-comp|ie-stand">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8,target-densitydpi=low-dpi" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/xadmin.css">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="./lib/layui/layui.js" charset="utf-8"></script>

</head>
<body class="login-bg">
<div class="login layui-anim layui-anim-up">
    <div class="message" >智慧农业管理系统</div>
    <form class="layui-form" id="Form">
        <input name="username" placeholder="用户名" type="text" lay-verify="required" class="layui-input">
        <hr class="hr15">
        <input name="password" placeholder="密码" type="password" lay-verify="required" class="layui-input">
        <hr class="hr15">

        <select name="role" lay-verify="required" class="layui-input">
            <option value="">请选择身份</option>
            <option value="admin">管理员</option>
            <option value="user">普通用户</option>
        </select>
        <hr class="hr15">

        <button lay-submit lay-filter="login" class="layui-btn" style="width:100%;">登录</button>
        <hr class="hr20">
    </form>
</div>

<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;

        // 表单提交监听
        form.on('submit(login)', function(data){
            var formData = $("#Form").serializeArray();
            var formObj = {};
            formData.forEach(function(item){
                formObj[item.name] = item.value;
            });

            var role = formObj.role;
            if (!role) {
                layer.msg("请选择身份", {icon: 2});
                return false;
            }

            var loginUrl = role === 'admin' ? '/admin/login' : '/user/login';

            $.ajax({
                url: loginUrl,
                type: "post",
                data: {
                    username: formObj.username,
                    password: formObj.password
                },
                success: function(res){
                    console.log("后端响应：", res);

                    if (res.code === 1 && res.data) {
                        layer.msg(res.message || "登录成功", {icon: 1});

                        // 分角色存储 token
                        if (role === 'admin') {
                            localStorage.setItem("token_admin", res.data);
                        } else {
                            localStorage.setItem("token_user", res.data);
                        }
                        localStorage.setItem("role", role);
                        localStorage.setItem("username", formObj.username);

                        setTimeout(function(){
                            if (role === 'admin') {
                                window.location.href = "admin-index.html";
                            } else {
                                window.location.href = "user-index.html";
                            }
                        }, 1000);
                    } else {
                        layer.msg(res.message || "账号或密码错误", {icon: 2});
                    }
                },
                error: function(err){
                    console.error("请求异常", err);
                    layer.msg("请求失败，请检查服务器", {icon: 2});
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
