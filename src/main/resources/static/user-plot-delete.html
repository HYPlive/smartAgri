<!DOCTYPE html>
<html class="x-admin-sm">
<head>
    <meta charset="UTF-8" />
    <title>批量删除地块 - 勾选版</title>
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Layui 样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.7.6/dist/css/layui.css" />
    <!-- jQuery -->
    <script src="https://cdn.staticfile.org/jquery/3.6.0/jquery.min.js"></script>
    <!-- Layui JS -->
    <script src="https://cdn.jsdelivr.net/npm/layui@2.7.6/dist/layui.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #e6f0ff, #ffffff);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 26px;
            color: #2c3e50;
        }

        .layui-table-view {
            border-radius: 12px;
            overflow: hidden;
        }

        .btn-group {
            margin-top: 30px;
            text-align: center;
        }

        .layui-btn {
            min-width: 140px;
            font-weight: bold;
            font-size: 15px;
            margin: 0 10px;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 20px;
            }

            h2 {
                font-size: 22px;
            }

            .layui-btn {
                min-width: 100px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>批量删除地块</h2>

    <table id="plotsTable" lay-filter="plotsTableFilter"></table>

    <div class="btn-group">
        <button class="layui-btn layui-btn-danger" id="deleteSelected">删除选中地块</button>
        <button class="layui-btn layui-btn-primary" id="refreshTable">刷新列表</button>
    </div>
</div>

<script>
    layui.use(['table', 'layer'], function () {
        const table = layui.table;
        const layer = layui.layer;

        function renderTable() {
            table.render({
                elem: '#plotsTable',
                id: 'plotsTable',
                url: '/user/plots',
                method: 'GET',
                headers: {
                    'authentication': localStorage.getItem('token_user')  // 和后端配置保持一致
                },
                parseData: function(res) {
                    return {
                        code: 0,
                        msg: '',
                        count: res.length,
                        data: res
                    };
                },
                cols: [[
                    { type: 'checkbox', fixed: 'left' },
                    { field: 'id', title: '地块ID', width: 100 },
                    { field: 'plotName', title: '地块名称' },
                    { field: 'lastCrop', title: '前作物', width: 100 },
                    { field: 'currentCrop', title: '当前作物', width: 100 },
                    { field: 'contactPerson', title: '联系人', width: 120 }
                ]],
                page: false
            });
        }

        renderTable();

        $('#deleteSelected').click(function () {
            const checkStatus = table.checkStatus('plotsTable');
            const selected = checkStatus.data;

            if (selected.length === 0) {
                return layer.msg('请先勾选至少一个地块', { icon: 5 });
            }

            const ids = selected.map(item => item.id);

            layer.confirm(`确定删除选中的 ${ids.length} 个地块吗？`, { icon: 3, title: '确认删除' }, function (index) {
                $.ajax({
                    headers: {
                        'authentication': localStorage.getItem('token_user')  // 和后端配置保持一致
                    },
                    url: '/user/plots/deleteBatch',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify(ids),
                    success: function () {
                        layer.msg('删除成功', { icon: 6 });
                        renderTable();
                    },
                    error: function () {
                        layer.msg('删除失败，请稍后重试', { icon: 2 });
                    }
                });
                layer.close(index);
            });
        });

        $('#refreshTable').click(function () {
            renderTable();
        });
    });
</script>
</body>
</html>
